<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web To Lead Form</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js"></script>
</head>

<body>
    <h1> Create Lead</h1>
    <form action="https://webto.salesforce.com/servlet/servlet.WebToLead?encoding=UTF-8&orgId=00DdL00000GoyIP"
        method="POST" onsubmit="beforeSubmit()">

        <input type=hidden name="oid" value="00DdL00000GoyIP">
        <input type=hidden name="retURL"
            value="https://manojasubbuduvvuri-star.github.io/Web-To-Lead-BootCamp/thanks.html">

        <input type=hidden name="Lead_Date__c" class="outputDate">

        <label for="first_name">First Name</label>
        <input id="first_name" maxlength="40" name="first_name" size="20" type="text" required="true" /><br>

        <label for="last_name">Last Name</label>

        <input id="last_name" maxlength="80" name="last_name" size="20" type="text" required="true" /><br>

        <label for="email">Email</label>
        <input id="email" maxlength="80" name="email" size="20" type="text" required="true" /><br>

        <label for="Lead Date">Lead Date</label>
        <input type="date" required="true" class="inputDate" />

        <!-- Lead Date:<span class="dateInput dateOnlyInput"><input id="00NdL00001wqKn7" name="00NdL00001wqKn7" size="12"
                type="text" /></span><br> -->

        <input type="submit" name="submit" class="submit">

    </form>
</body>

</html>
